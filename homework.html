<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE FOOD ORDERING</title>
</head>
<body>
    <h1>ONLINE FOOD ORDERING SECTION</h1>
    <h3>Menu Card</h3>
    <table border="1">
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>select</th>
        </tr>
        <tr>
            <td>veg burger</td>
            <td>120</td>
            <td><input type="checkbox"></td>
        </tr>
        <tr>
            <td>pizza</td>
            <td>250</td>
            <td><input type="checkbox"></td>
        </tr>
        <tr>
            <td>french fries</td>
            <td>100</td>
            <td><input type="checkbox"></td>
        </tr>
        <tr>
            <td>cold drink</td>
            <td>50</td>
            <td><input type="checkbox"></td>
        </tr>
        <tr>
            <td>ice cream</td>
            <td>80</td>
            <td><input type="checkbox"></td>
        </tr>
    </table>
     <h1>CUSTOMER DETAILS</h1>
    <fieldset>
        <legend>this is simple from</legend> 
          <form>
        <label for="fullname">full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="50" required></textarea><br><br>
        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" required><br><br>

        <input type="submit" value="Submit">
        </form>
        </fieldset>
        <h1>PAYMENT METHOD</h1>
    <input type ="radio" name="payment" value="cash on delivery"> cash on delivery<br>
    <input type ="radio" name="payment" value="UPI"> UPI<br>
    <input type ="radio" name="payment" value="Debit Card/debit card"> Debit Card/debit card<br>
    <h1>ORDER SUMMARY</h1>
    <p>spacial instructions:</p>
    <iframe frameborder="4" width="100%" height="200%"></iframe>
    <button type = "place order">Submit</button>
        <button type = "clear form">Reset</button>
</body>
</html>
